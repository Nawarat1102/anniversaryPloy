<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Anniversary Ploy ❤️ 6 Years 9 Months</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;600&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --bg: #fff0f3;
            --text: #590d22;
            --cake-color: #f7b7b7;
            --cream-color: #fff;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
            user-select: none;
            scroll-behavior: smooth;
        }

        /* หน้าปก: ซองจดหมายเซอร์ไพรส์ */
        #gatekeeper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; transition: 1.5s ease-in-out;
        }
        .envelope-icon { font-size: 100px; cursor: pointer; animation: bounce 2s infinite; }
        .open-text { color: white; margin-top: 20px; font-weight: bold; border: 2px solid white; padding: 10px 25px; border-radius: 50px; cursor: pointer; animation: pulse 1.5s infinite; }

        /* เนื้อหาหลัก */
        #main-content {
            opacity: 0; display: none;
            flex-direction: column; align-items: center;
            padding: 20px 20px 50px; text-align: center;
            position: relative;
        }

        /* ส่วนหัว */
        .header-title { font-family: 'Caveat', cursive; font-size: 3.5rem; color: var(--primary); margin: 20px 0 0; }
        .anniversary-date { font-size: 0.9rem; margin-bottom: 30px; opacity: 0.7; }

        /* สไลด์โชว์รูปแบบ Polaroid - ปรับปรุงให้รูปเต็มเฟรม */
        .polaroid-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; }
        .polaroid {
            width: 300px; background: white; padding: 12px 12px 45px 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: rotate(-1deg); position: relative; border-radius: 2px;
        }
        .slide { 
            width: 100%; 
            height: 350px; 
            object-fit: cover; /* ทำให้รูปเต็มกรอบและไม่เบี้ยว */
            display: none; 
            border-radius: 2px; 
        }
        .slide.active { display: block; animation: fadeEffect 1s; }
        .polaroid-caption { font-family: 'Caveat', cursive; font-size: 1.8rem; color: var(--text); margin-top: 15px; }

        /* ตัวนับเวลาแบบละเอียด */
        .timer-section {
            width: 90%; max-width: 400px; background: white; border-radius: 25px;
            padding: 30px 15px; box-shadow: 0 10px 25px rgba(255, 77, 109, 0.1);
            margin-bottom: 40px; border: 2px solid var(--secondary);
        }
        .timer-title { font-weight: bold; color: var(--primary); font-size: 1.2rem; margin-bottom: 20px; }
        .timer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .timer-box { background: var(--bg); padding: 15px 5px; border-radius: 15px; border: 1px solid var(--secondary); }
        .timer-val { font-size: 2.2rem; font-weight: bold; color: var(--primary); display: block; line-height: 1; }
        .timer-unit { font-size: 0.75rem; font-weight: 300; color: var(--text); }
        .live-clock { font-size: 0.9rem; margin-top: 15px; opacity: 0.6; }

        /* จดหมายรัก */
        .letter-container {
            width: 85%; max-width: 450px; background: rgba(255, 255, 255, 0.9);
            padding: 25px; border-radius: 20px; border-left: 5px solid var(--primary);
            text-align: left; line-height: 1.8; margin-bottom: 60px; min-height: 150px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            font-size: 1.05rem;
        }

        /* แอนิเมชั่น */
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); } 70% { box-shadow: 0 0 0 10px rgba(255,255,255,0); } 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); } }
        @keyframes fadeEffect { from { opacity: 0.3; } to { opacity: 1; } }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes heartPop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2) translateY(-100px); opacity: 0; } }

        .touch-heart { position: absolute; pointer-events: none; animation: heartPop 0.8s forwards; font-size: 30px; z-index: 1000; }
        .falling-heart { position: fixed; top: -10%; z-index: -1; animation: fall linear forwards; }
    </style>
</head>
<body onclick="createHeart(event)">

    <audio id="mySong" loop>
        <source src="yimgay.mp3" type="audio/mpeg">
    </audio>

    <div id="gatekeeper" onclick="openSurprise()">
        <div class="envelope-icon">💌</div>
        <div class="open-text">กดเพื่อเปิดของขวัญนะ พลอย</div>
    </div>

    <div id="main-content">
        <h1 class="header-title">Happy Anniversary</h1>
        <div class="anniversary-date">Together Since 15.07.2562 ❤️</div>

        <div class="polaroid-container">
            <div class="polaroid">
                <img class="slide active" src="https://i.ibb.co/ZpW8CFF1/58.jpg">
                <img class="slide" src="https://i.ibb.co/Tj440G7/57.jpg">
                <img class="slide" src="https://i.ibb.co/LhkPxRb0/56.jpg">
                <img class="slide" src="https://i.ibb.co/dJQZk8Cn/55.jpg">
                <img class="slide" src="https://i.ibb.co/ZRT68CQt/LINE-ALBUM-1369-260410-1.jpg">
                <img class="slide" src="https://i.ibb.co/zTd30bVX/LINE-ALBUM-1369-260410-2.jpg">
                <img class="slide" src="https://i.ibb.co/MxZKwyR2/LINE-ALBUM-6469-260410-1.jpg">
            </div>
            <div class="polaroid-caption">รักอ้วนที่สุดเลย! ❤️</div>
        </div>

        <div class="timer-section">
            <div class="timer-title">...เวลาที่เราจับมือกัน...</div>
            <div class="timer-grid">
                <div class="timer-box"><span id="years" class="timer-val">0</span><span class="timer-unit">ปี (Years)</span></div>
                <div class="timer-box"><span id="months" class="timer-val">0</span><span class="timer-unit">เดือน (Months)</span></div>
                <div class="timer-box"><span id="days" class="timer-val">0</span><span class="timer-unit">วัน (Days)</span></div>
            </div>
            <div class="live-clock" id="live-clock"></div>
        </div>

        <div class="letter-container" id="typewriter"></div>

        <p style="font-size: 0.8rem; opacity: 0.5; margin-bottom: 30px;">Happy Anniversary • 6 Years 9 Months • 2026</p>
    </div>

    <script>
        // ข้อความซึ้งๆ ที่คุณเรียบเรียง
        const messageText = "❤️ Happy Anniversary 6 ปี 9 เดือนนะอ้วน... ขอบคุณที่ร่วมเดินทางและอยู่เคียงข้างกันมานานขนาดนี้นะ ขอบคุณที่คอยให้อภัยเค้าเสมอมา ไม่ว่าเค้าจะทำผิดแค่ไหน จะเรื่องเล็กหรือเรื่องใหญ่ เธอก็พร้อมจะเข้าใจและไม่เคยทิ้งเค้าไปไหนเลย ในวันที่เค้าล้มลง หรือในวันที่เค้าเจ็บป่วย เธอก็เป็นคนที่อยู่ตรงนั้นคอยดูแลเค้าอย่างดีที่สุดเสมอ ขอบคุณที่ซัพพอร์ตเค้าในทุกๆ เรื่อง แม้ในวันที่เค้าลำบาก เธอก็คอยยื่นมือมาช่วย คอยดูแลเรื่องปากท้อง พาเค้าไปเที่ยวให้มีความสุข และทำให้เค้าไม่ต้องรู้สึกโดดเดี่ยวเลย เค้าอาจจะเป็นคนที่แสดงออกไม่เก่ง พูดไม่ค่อยหวาน แต่เค้าอยากให้รู้ไว้ว่าเธอคือคนสำคัญที่สุดในชีวิต และเป็นคนแรกที่เค้าอยากมอบความรักและทุกสิ่งทุกอย่างที่เค้ามีให้ทั้งหมด เค้าสัญญาว่าจะทำทุกอย่างให้เธอมีความสุขที่สุด จะทำทุกอย่างให้โดยที่เธอไม่ต้องร้องขอเลยนะ เค้าจะอยู่ข้างๆ เธอแบบนี้ตลอดไปนะอ้วน รักที่สุดเลยนะ!";

        const startDate = new Date('2019-07-15T00:00:00');

        function openSurprise() {
            const song = document.getElementById('mySong');
            song.play().catch(e => console.log("Audio block: " + e));

            document.getElementById('gatekeeper').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                setTimeout(() => {
                    document.getElementById('main-content').style.opacity = '1';
                    startTypewriter();
                }, 100);
            }, 1000);
        }

        function updateDetailedCounter() {
            const now = new Date();
            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonth;
                months--;
            }
            if (months < 0) {
                months += 12;
                years--;
            }

            document.getElementById('years').innerText = years;
            document.getElementById('months').innerText = months;
            document.getElementById('days').innerText = days;

            const diff = now - startDate;
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / (1000 * 60)) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            document.getElementById('live-clock').innerText = `${hours} ชม. ${mins} นาที ${secs} วินาที`;
        }
        setInterval(updateDetailedCounter, 1000);
        updateDetailedCounter();

        // สไลด์โชว์เปลี่ยนทุก 3 วินาที
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 3000);

        // เอฟเฟกต์พิมพ์ตัวอักษร
        let charIndex = 0;
        function startTypewriter() {
            if (charIndex < messageText.length) {
                document.getElementById("typewriter").innerHTML += messageText.charAt(charIndex);
                charIndex++;
                setTimeout(startTypewriter, 70);
            }
        }

        function createHeart(e) {
            const heart = document.createElement('div');
            heart.classList.add('touch-heart');
            heart.innerHTML = '❤️';
            heart.style.left = e.pageX + 'px';
            heart.style.top = e.pageY + 'px';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 800);
        }

        // หัวใจร่วงหล่น
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('falling-heart');
            h.innerHTML = ['❤️','💕','💖','✨'][Math.floor(Math.random()*4)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = (Math.random() * 15 + 10) + 'px';
            h.style.animationDuration = (Math.random() * 3 + 2) + 's';
            h.style.opacity = Math.random();
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 450);
    </script>
</body>
</html>
